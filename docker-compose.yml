version: '3.9'

services:
  # --- DATABASES ---
  
  auth-db:
    image: postgres:16-alpine # Alpine is lighter for 8GB RAM
    container_name: auth-postgres
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  wallet-db:
    image: postgres:16-alpine
    container_name: wallet-postgres
    restart: always
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - wallet_db_data:/var/lib/postgresql/data

  transfer-db:
    image: postgres:16-alpine
    container_name: transfer-postgres
    restart: always
    environment:
      POSTGRES_DB: transfer_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - transfer_db_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port


  # --- OPTIONAL: Services (Uncomment to run in Docker) ---
  # Note: Running Java in Docker is heavier on RAM than running directly on Mac
  
  # auth-service:
  #   build: ./backend/auth-service
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     - auth-db
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/auth_db

volumes:
  auth_db_data:
  wallet_db_data:
  transfer_db_data:
