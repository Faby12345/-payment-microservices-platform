spring.application.name=wallet-service

# Import .env file (Spring Boot 2.4+)
spring.config.import=optional:file:.env[.properties]

server.port=${APP_PORT:8081}

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT:5434}/${DB_NAME:wallet_db}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Migration - Manual SQL Control
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JPA / Hibernate - Disable Auto Schema Creation
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
