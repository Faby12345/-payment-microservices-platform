spring.datasource.url=jdbc:h2:mem:walletdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Flyway create the schema
spring.flyway.enabled=true

# Disable Hibernate's automatic schema validation during tests
# This prevents it from complaining about JSON vs JSONB types
spring.jpa.hibernate.ddl-auto=none

# Show SQL in logs for debugging tests
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
