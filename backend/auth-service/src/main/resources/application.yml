
spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/${POSTGRES_DB:auth_db}
    username: ${POSTGRES_USER:user}
    password: ${POSTGRES_PASSWORD:password}

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true


application:
  security:
    jwt:
      # Use a long, random string here (at least 256-bit for HS256)
      secret-key: ${JWT_SECRET_KEY}
      expiration: 3600000 # 1 hour in milliseconds
      refresh-token:
        expiration: 604800000 # 7 days